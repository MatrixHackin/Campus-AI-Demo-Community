# Before applying this manifest, create the two secrets:
# kubectl create namespace campus-ai-system
# kubectl -n campus-ai-system create secret generic ssh-gateway-host-key \
#   --from-file=ssh_gateway_host_key=backend/.run/ssh_gateway_host_key
# kubectl -n campus-ai-system create secret generic ssh-gateway-control-plane \
#   --from-literal=token='<same value as backend INTERNAL_API_TOKEN>'
apiVersion: v1
kind: Namespace
metadata:
  name: campus-ai-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ssh-gateway
  namespace: campus-ai-system
  labels:
    app: ssh-gateway
spec:
  selector:
    matchLabels:
      app: ssh-gateway
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ssh-gateway
    spec:
      nodeSelector:
        competition: "true"
      terminationGracePeriodSeconds: 60
      containers:
        - name: ssh-gateway
          image: gpunion2.io/library/campus-ai-ssh-gateway:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_ENV
              value: production
            - name: SSH_GATEWAY_ENABLED
              value: "true"
            - name: SSH_GATEWAY_HOST
              value: 0.0.0.0
            - name: SSH_GATEWAY_PORT
              value: "2222"
            - name: SSH_GATEWAY_HOST_KEY_PATH
              value: /etc/campus-ai/ssh/ssh_gateway_host_key
            - name: SSH_GATEWAY_TARGET_MODE
              value: service
            - name: SSH_GATEWAY_RESOLVER_MODE
              value: http
            - name: SSH_GATEWAY_CONTROL_PLANE_BASE_URL
              value: http://10.120.17.138:8080
            - name: SSH_GATEWAY_CONTROL_PLANE_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ssh-gateway-control-plane
                  key: token
            - name: SSH_GATEWAY_CONTROL_PLANE_TIMEOUT_SECONDS
              value: "5"
          volumeMounts:
            - name: ssh-host-key
              mountPath: /etc/campus-ai/ssh
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: ssh-host-key
          secret:
            secretName: ssh-gateway-host-key
            defaultMode: 0600
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-gateway-ssh
  namespace: campus-ai-system
  labels:
    app: ssh-gateway
spec:
  type: NodePort
  selector:
    app: ssh-gateway
  ports:
    - name: ssh
      port: 2222
      targetPort: ssh
      nodePort: 32222
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-gateway-web
  namespace: campus-ai-system
  labels:
    app: ssh-gateway
spec:
  type: ClusterIP
  selector:
    app: ssh-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
